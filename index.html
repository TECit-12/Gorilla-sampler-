<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Gorilla Sampler - MPC One Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: #2a1a3e;
            color: #00d9ff;
        }

        .status-bar {
            background: #1a0f2e;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            border-bottom: 2px solid #00d9ff;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Top Navigation */
        .nav-tabs {
            display: flex;
            background: #1a0f2e;
            border-bottom: 1px solid #00d9ff;
            padding: 0;
        }

        .nav-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border-right: 1px solid #00d9ff;
            background: #2a1a3e;
            color: #888;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
        }

        .nav-tab.active {
            background: #ff1493;
            color: white;
            border-radius: 8px 8px 0 0;
        }

        .nav-tab:last-child {
            border-right: none;
        }

        /* Display Screen */
        .display {
            background: #000;
            border: 2px solid #00d9ff;
            margin: 8px;
            padding: 12px;
            border-radius: 6px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: #00d9ff;
            font-size: 12px;
            font-family: 'Courier New', monospace;
        }

        .display-info {
            display: flex;
            justify-content: space-between;
        }

        .display-main {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-top: 8px;
        }

        /* Content Area */
        .content {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        .tab-content {
            display: none;
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            width: 100%;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        /* Pads Section */
        .pads-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .pads-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 8px;
            flex: 1;
            min-height: 0;
        }

        .pad {
            background: linear-gradient(135deg, #c41e3a, #8b0000);
            border: 3px solid #00d9ff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.05s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #00d9ff;
            user-select: none;
            touch-action: manipulation;
            font-size: 16px;
            box-shadow: inset 0 0 10px rgba(0, 217, 255, 0.3);
        }

        .pad:hover {
            box-shadow: inset 0 0 15px rgba(0, 217, 255, 0.5), 0 0 20px rgba(196, 30, 58, 0.8);
        }

        .pad:active {
            background: linear-gradient(135deg, #ff1493, #c41e3a);
            border-color: #ff1493;
            transform: scale(0.95);
            box-shadow: 0 0 30px rgba(255, 20, 147, 0.8);
        }

        .pad.playing {
            background: linear-gradient(135deg, #00d9ff, #00ffff);
            border-color: #ff1493;
            color: #000;
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.8), inset 0 0 15px rgba(255, 20, 147, 0.4);
        }

        /* Sequencer */
        .sequencer-grid {
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            gap: 4px;
            margin-bottom: 16px;
        }

        .step {
            aspect-ratio: 1;
            background: #1a0f2e;
            border: 2px solid #00d9ff;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.1s;
        }

        .step:hover {
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
        }

        .step.active {
            background: #ff1493;
            border-color: #ff1493;
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.8);
        }

        .step.playing {
            background: #00d9ff;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.8);
        }

        /* Knobs Section */
        .knobs-section {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 12px;
        }

        .knob-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .knob {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: conic-gradient(from 135deg, #ff1493 0deg, #ff1493 var(--rotation), #1a0f2e var(--rotation));
            border: 3px solid #00d9ff;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .knob::after {
            content: '';
            width: 2px;
            height: 20px;
            background: #00d9ff;
            position: absolute;
            top: 5px;
        }

        .knob-label {
            font-size: 10px;
            color: #00d9ff;
            text-align: center;
        }

        .knob-value {
            font-size: 9px;
            color: #ff1493;
        }

        /* Controls */
        .controls {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 12px;
            background: #1a0f2e;
            border-top: 2px solid #00d9ff;
        }

        .btn {
            padding: 12px;
            background: #2a1a3e;
            border: 2px solid #00d9ff;
            border-radius: 6px;
            color: #00d9ff;
            cursor: pointer;
            font-weight: 600;
            font-size: 11px;
            transition: all 0.2s;
        }

        .btn:hover {
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
        }

        .btn:active {
            background: #ff1493;
            border-color: #ff1493;
            color: white;
        }

        .btn.active {
            background: #ff1493;
            border-color: #ff1493;
            color: white;
        }

        /* Control Sliders */
        .slider-group {
            margin-bottom: 12px;
            padding: 12px;
            background: #1a0f2e;
            border: 2px solid #00d9ff;
            border-radius: 6px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 6px;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #2a1a3e;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ff1493;
            cursor: pointer;
            border: 2px solid #00d9ff;
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ff1493;
            cursor: pointer;
            border: 2px solid #00d9ff;
        }

        /* Scrollbar */
        .tab-content::-webkit-scrollbar {
            width: 6px;
        }

        .tab-content::-webkit-scrollbar-track {
            background: #1a0f2e;
        }

        .tab-content::-webkit-scrollbar-thumb {
            background: #ff1493;
            border-radius: 3px;
        }

        /* Responsive */
        @media (max-height: 700px) {
            .pad {
                font-size: 12px;
            }

            .knob {
                width: 45px;
                height: 45px;
            }

            .display {
                min-height: 60px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <!-- Status Bar -->
    <div class="status-bar">
        <div>🦍 GORILLA SAMPLER</div>
        <div id="status-info">BPM: <span id="bpmDisplay">120</span> | <span id="timeDisplay">00:00</span></div>
    </div>

    <div class="container">
        <!-- Navigation Tabs -->
        <div class="nav-tabs">
            <div class="nav-tab active" onclick="switchTab('sample')">SAMPLE</div>
            <div class="nav-tab" onclick="switchTab('sequence')">SEQUENCE</div>
            <div class="nav-tab" onclick="switchTab('perform')">PERFORM</div>
            <div class="nav-tab" onclick="switchTab('effects')">EFFECTS</div>
        </div>

        <!-- Display Screen -->
        <div class="display">
            <div class="display-info">
                <span>Pattern: <span id="patternNum">01</span></span>
                <span id="playStatus">STOPPED</span>
                <span>Volume: <span id="volumeDisplay">100</span>%</span>
            </div>
            <div class="display-main" id="displayMain">Ready to sample</div>
        </div>

        <!-- Content -->
        <div class="content">
            <!-- SAMPLE Tab -->
            <div id="sample" class="tab-content active">
                <div class="slider-group">
                    <div class="slider-label">
                        <span>Sample Volume</span>
                        <span id="sampleVolValue">100</span>%
                    </div>
                    <input type="range" min="0" max="100" value="100" id="sampleVol" oninput="updateSampleVol(this.value)">
                </div>

                <div class="slider-group">
                    <div class="slider-label">
                        <span>Pitch</span>
                        <span id="pitchValue">0</span>
                    </div>
                    <input type="range" min="-24" max="24" value="0" id="pitch" oninput="updatePitch(this.value)">
                </div>

                <div class="slider-group">
                    <div class="slider-label">
                        <span>Start Point</span>
                        <span id="startValue">0</span>ms
                    </div>
                    <input type="range" min="0" max="1000" value="0" id="startPoint">
                </div>

                <div class="slider-group">
                    <div class="slider-label">
                        <span>End Point</span>
                        <span id="endValue">1000</span>ms
                    </div>
                    <input type="range" min="0" max="1000" value="1000" id="endPoint">
                </div>

                <div class="controls" style="border-top: 2px solid #00d9ff; margin-top: auto;">
                    <button class="btn" onclick="recordSample()">🎤 RECORD</button>
                    <button class="btn" onclick="loadSample()">📁 LOAD</button>
                    <button class="btn" onclick="clearSample()">🗑️ CLEAR</button>
                    <button class="btn" onclick="playSample()">▶️ PLAY</button>
                </div>
            </div>

            <!-- SEQUENCE Tab -->
            <div id="sequence" class="tab-content">
                <div class="slider-group">
                    <div class="slider-label">
                        <span>BPM</span>
                        <span id="bpmValue">120</span>
                    </div>
                    <input type="range" min="40" max="300" value="120" id="bpmControl" oninput="updateBPM(this.value)">
                </div>

                <div class="slider-group">
                    <div class="slider-label">
                        <span>Swing</span>
                        <span id="swingValue">0</span>%
                    </div>
                    <input type="range" min="0" max="100" value="0" id="swing">
                </div>

                <div style="margin-bottom: 12px;">
                    <div style="font-size: 12px; color: #00d9ff; margin-bottom: 8px;">Step Sequencer (16 Steps)</div>
                    <div class="sequencer-grid" id="sequencerGrid">
                        <!-- Steps will be generated by JS -->
                    </div>
                </div>

                <div class="controls" style="border-top: 2px solid #00d9ff;">
                    <button class="btn" onclick="playSequence()">▶️ PLAY</button>
                    <button class="btn" onclick="stopSequence()">⏹️ STOP</button>
                    <button class="btn" onclick="savePattern()">💾 SAVE</button>
                    <button class="btn" onclick="loadPattern()">📁 LOAD</button>
                </div>
            </div>

            <!-- PERFORM Tab -->
            <div id="perform" class="tab-content">
                <div class="pads-section">
                    <div class="pads-container" id="padGrid">
                        <!-- Pads will be generated by JS -->
                    </div>
                </div>
            </div>

            <!-- EFFECTS Tab -->
            <div id="effects" class="tab-content">
                <div class="slider-group">
                    <div class="slider-label">
                        <span>Reverb</span>
                        <span id="reverbValue">30</span>%
                    </div>
                    <input type="range" min="0" max="100" value="30" id="reverb">
                </div>

                <div class="slider-group">
                    <div class="slider-label">
                        <span>Delay</span>
                        <span id="delayValue">0</span>%
                    </div>
                    <input type="range" min="0" max="100" value="0" id="delay">
                </div>

                <div class="slider-group">
                    <div class="slider-label">
                        <span>Filter Cutoff</span>
                        <span id="filterValue">100</span>%
                    </div>
                    <input type="range" min="0" max="100" value="100" id="filter">
                </div>

                <div class="slider-group">
                    <div class="slider-label">
                        <span>Resonance</span>
                        <span id="resonanceValue">0</span>%
                    </div>
                    <input type="range" min="0" max="100" value="0" id="resonance">
                </div>

                <div class="slider-group">
                    <div class="slider-label">
                        <span>Compression</span>
                        <span id="compressionValue">0</span>%
                    </div>
                    <input type="range" min="0" max="100" value="0" id="compression">
                </div>

                <div class="slider-group">
                    <div class="slider-label">
                        <span>Distortion</span>
                        <span id="distortionValue">0</span>%
                    </div>
                    <input type="range" min="0" max="100" value="0" id="distortion">
                </div>
            </div>
        </div>

        <!-- Bottom Transport Controls -->
        <div class="controls">
            <button class="btn" id="playBtn" onclick="togglePlay()">▶️ PLAY</button>
            <button class="btn" onclick="stopPlayback()">⏹️ STOP</button>
            <button class="btn" onclick="prevPattern()">◀️ PREV</button>
            <button class="btn" onclick="nextPattern()">▶️ NEXT</button>
        </div>
    </div>

    <script>
        // Audio Context
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        let isPlaying = false;
        let currentBPM = 120;
        let playbackTime = 0;
        let currentPattern = 1;
        let recordedAudio = null;
        let sequencerSteps = new Array(16).fill(false);

        // Initialize Pads
        function initPads() {
            const padGrid = document.getElementById('padGrid');
            for (let i = 1; i <= 16; i++) {
                const pad = document.createElement('div');
                pad.className = 'pad';
                pad.textContent = i;
                pad.dataset.padNum = i;
                pad.addEventListener('mousedown', () => padPress(pad, i));
                pad.addEventListener('touchstart', (e) => { e.preventDefault(); padPress(pad, i); });
                pad.addEventListener('mouseup', () => padRelease(pad));
                pad.addEventListener('touchend', (e) => { e.preventDefault(); padRelease(pad); });
                padGrid.appendChild(pad);
            }
        }

        function padPress(pad, num) {
            pad.classList.add('playing');
            updateDisplay(`PAD ${num} TRIGGERED`);
            playTone(440 * Math.pow(2, (num - 1) / 12)); // Simple frequency for visual feedback
        }

        function padRelease(pad) {
            setTimeout(() => pad.classList.remove('playing'), 100);
        }

        // Initialize Sequencer
        function initSequencer() {
            const grid = document.getElementById('sequencerGrid');
            for (let i = 0; i < 16; i++) {
                const step = document.createElement('div');
                step.className = 'step';
                step.dataset.step = i;
                step.addEventListener('click', () => toggleStep(step, i));
                grid.appendChild(step);
            }
        }

        function toggleStep(stepEl, index) {
            sequencerSteps[index] = !sequencerSteps[index];
            stepEl.classList.toggle('active');
        }

        // Display Update
        function updateDisplay(text) {
            document.getElementById('displayMain').textContent = text;
        }

        // BPM Control
        function updateBPM(value) {
            currentBPM = parseInt(value);
            document.getElementById('bpmValue').textContent = value;
            document.getElementById('bpmDisplay').textContent = value;
        }

        function updateSampleVol(value) {
            document.getElementById('sampleVolValue').textContent = value;
        }

        function updatePitch(value) {
            document.getElementById('pitchValue').textContent = value;
        }

        // Playback Controls
        function togglePlay() {
            isPlaying = !isPlaying;
            const playBtn = document.getElementById('playBtn');
            const playStatus = document.getElementById('playStatus');
            
            if (isPlaying) {
                playBtn.classList.add('active');
                playStatus.textContent = 'PLAYING ▶️';
                updateDisplay('PATTERN PLAYING...');
                startSequence();
            } else {
                playBtn.classList.remove('active');
                playStatus.textContent = 'PAUSED';
                updateDisplay('PATTERN PAUSED');
            }
        }

        function stopPlayback() {
            isPlaying = false;
            document.getElementById('playBtn').classList.remove('active');
            document.getElementById('playStatus').textContent = 'STOPPED';
            updateDisplay('Ready to sample');
        }

        function nextPattern() {
            currentPattern = (currentPattern % 128) + 1;
            document.getElementById('patternNum').textContent = String(currentPattern).padStart(2, '0');
            updateDisplay(`PATTERN: ${String(currentPattern).padStart(2, '0')}`);
        }

        function prevPattern() {
            currentPattern = currentPattern > 1 ? currentPattern - 1 : 128;
            document.getElementById('patternNum').textContent = String(currentPattern).padStart(2, '0');
            updateDisplay(`PATTERN: ${String(currentPattern).padStart(2, '0')}`);
        }

        // Sequencer Playback
        function startSequence() {
            let currentStep = 0;
            const stepDuration = (60 / currentBPM) * 1000; // ms per step
            
            const playStep = () => {
                if (!isPlaying) return;
                
                // Update step indicator
                document.querySelectorAll('.step').forEach((s, idx) => {
                    s.classList.remove('playing');
                    if (idx === currentStep) s.classList.add('playing');
                });

                if (sequencerSteps[currentStep]) {
                    updateDisplay(`STEP ${currentStep + 1}`);
                    playTone(440);
                }

                currentStep = (currentStep + 1) % 16;
                setTimeout(playStep, stepDuration);
            };
            
            playStep();
        }

        // Audio Functions
        function playTone(frequency) {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            osc.connect(gain);
            gain.connect(audioContext.destination);
            
            osc.frequency.value = frequency;
            gain.gain.setValueAtTime(0.3, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
            
            osc.start(audioContext.currentTime);
            osc.stop(audioContext.currentTime + 0.1);
        }

        // Sample Controls
        function recordSample() {
            updateDisplay('RECORDING... PRESS TO STOP');
            setTimeout(() => updateDisplay('Sample recorded'), 2000);
        }

        function loadSample() {
            updateDisplay('LOAD SAMPLE');
        }

        function clearSample() {
            updateDisplay('Sample cleared');
        }

        function playSample() {
            updateDisplay('PLAYING SAMPLE');
            playTone(440);
        }

        function playSequence() {
            togglePlay();
        }

        function stopSequence() {
            stopPlayback();
        }

        function savePattern() {
            updateDisplay('PATTERN SAVED');
        }

        function loadPattern() {
            updateDisplay('PATTERN LOADED');
        }

        // Tab Switching
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
        }

        // Time Display
        function updateTime() {
            const now = new Date();
            const time = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });
            document.getElementById('timeDisplay').textContent = time;
        }

        updateTime();
        setInterval(updateTime, 1000);

        // Update slider values
        document.getElementById('reverb').oninput = function() {
            document.getElementById('reverbValue').textContent = this.value;
        };
        document.getElementById('delay').oninput = function() {
            document.getElementById('delayValue').textContent = this.value;
        };
        document.getElementById('filter').oninput = function() {
            document.getElementById('filterValue').textContent = this.value;
        };
        document.getElementById('resonance').oninput = function() {
            document.getElementById('resonanceValue').textContent = this.value;
        };
        document.getElementById('compression').oninput = function() {
            document.getElementById('compressionValue').textContent = this.value;
        };
        document.getElementById('distortion').oninput = function() {
            document.getElementById('distortionValue').textContent = this.value;
        };

        // Initialize
        initPads();
        initSequencer();
    </script>
</body>
</html>
